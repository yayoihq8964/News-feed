version: "3.9"

services:
  backend:
    build: ./backend
    container_name: macrolens-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: macrolens-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
